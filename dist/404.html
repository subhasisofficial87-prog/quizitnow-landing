<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // GitHub Pages 404 redirect script
        // Redirects /app-name/ requests to /app-name/index.html
        (function() {
            const path = window.location.pathname;

            // List of valid app directories
            const appDirs = [
                'cosmic-word-play',
                'zoomable-earth',
                'guess-my-neon',
                'quizitnow',
                'recipe-generator',
                'ox-bull-cow'
            ];

            // Check if the path is for a subdirectory (but not the root)
            const pathParts = path.split('/').filter(p => p);

            // If accessing /app-name/ route, redirect to /app-name/index.html
            if (pathParts.length === 1 && appDirs.includes(pathParts[0])) {
                const newPath = path.endsWith('/') ? path + 'index.html' : path + '/index.html';
                window.location.replace(newPath);
            }
        })();
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
