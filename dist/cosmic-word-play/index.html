<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Word Play - Wordly</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #0f1535 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid rgba(0, 255, 255, 0.2);
        }

        h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #00ffff, #ff0080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #00ffff;
            opacity: 0.8;
        }

        .nav-back {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .nav-back:hover {
            transform: translateX(-5px);
            color: #ff0080;
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 10px;
            font-size: 12px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #00ffff;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 20px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(5, 60px);
            gap: 8px;
            margin-bottom: 20px;
        }

        .guess-row {
            display: contents;
        }

        .tile {
            width: 60px;
            height: 60px;
            border: 2px solid #00ffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            background: rgba(0, 255, 255, 0.1);
            color: #ffffff;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .tile.filled {
            border-color: #ff0080;
            background: rgba(255, 0, 128, 0.2);
        }

        .tile.correct {
            background: #00ff00;
            color: #000000;
            border-color: #00ff00;
            transform: scale(1.05);
        }

        .tile.present {
            background: #ffff00;
            color: #000000;
            border-color: #ffff00;
            transform: scale(1.05);
        }

        .tile.absent {
            background: #666666;
            color: #ffffff;
            border-color: #666666;
            transform: scale(1.05);
        }

        .input-section {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 500px;
        }

        #guessInput {
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #00ffff;
            background: rgba(0, 255, 255, 0.1);
            color: #ffffff;
            border-radius: 4px;
            text-transform: uppercase;
            min-width: 150px;
        }

        #guessInput:focus {
            outline: none;
            border-color: #ff0080;
            background: rgba(255, 0, 128, 0.15);
            box-shadow: 0 0 10px rgba(255, 0, 128, 0.3);
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #00ffff, #ff0080);
            color: #0a0e27;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            font-size: 18px;
            min-height: 30px;
            text-align: center;
            font-weight: bold;
        }

        .message.error {
            color: #ff6b6b;
        }

        .message.success {
            color: #00ff00;
        }

        .message.info {
            color: #00ffff;
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(35px, 1fr));
            gap: 4px;
            max-width: 500px;
            margin-top: 20px;
        }

        .key {
            padding: 8px 6px;
            font-size: 12px;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #00ffff;
            color: #ffffff;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }

        .key:hover {
            background: rgba(0, 255, 255, 0.4);
        }

        .key.correct {
            background: #00ff00;
            color: #000000;
            border-color: #00ff00;
        }

        .key.present {
            background: #ffff00;
            color: #000000;
            border-color: #ffff00;
        }

        .key.absent {
            background: #666666;
            color: #999999;
            border-color: #666666;
            opacity: 0.6;
        }

        .game-over {
            text-align: center;
            font-size: 18px;
        }

        .word-reveal {
            font-size: 32px;
            font-weight: bold;
            color: #00ffff;
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .attempts {
            font-size: 14px;
            color: #b0b0b0;
            margin: 10px 0;
        }

        .hint {
            font-size: 14px;
            color: #ffff00;
            margin-top: 10px;
            font-style: italic;
        }

        @media (max-width: 600px) {
            .game-board {
                grid-template-columns: repeat(5, 45px);
                gap: 6px;
            }

            .tile {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

            'VERSE': 'Poetry line',
            'VERSUS': 'Against',
            'VESSEL': 'Container',
            'VESTAL': 'Pure',
            'VESTED': 'Invested',
            'VETERAN': 'Experienced person',
            'VETO': 'Reject',
            'VIABLE': 'Workable',
            'VIAND': 'Food item',
            'VIALS': 'Small bottles',
            'VIBES': 'Feelings',
            'VICAR': 'Clergy member',
            'VICES': 'Bad habits',
            'VICTIM': 'Sufferer',
            'VICTORY': 'Winning',
            'VIDEO': 'Recorded image',
            'VIEWS': 'Opinions',
            'VIGIL': 'Watch over',
            'VIGOR': 'Energy',
            'VILLA': 'Large house',
            'VILLAN': 'Bad character',
            'VINE': 'Climbing plant',
            'VINES': 'Plant tendrils',
            'VINYL': 'Plastic material',
            'VIOLA': 'Musical instrument',
            'VIOLIN': 'String instrument',
            'VIRAL': 'Spread widely',
            'VIRGIN': 'Never touched',
            'VIRUS': 'Infectious agent',
            'VISAGE': 'Face',
            'VISION': 'Sight or dream',
            'VISIT': 'Call on',
            'VISOR': 'Brim',
            'VISTA': 'View',
            'VISUAL': 'Sight related',
            'VITAL': 'Essential',
            'VIVID': 'Bright colors',
            'VOCAL': 'Voice related',
            'VODKA': 'Alcoholic drink',
            'VOICE': 'Speech sounds',
            'VOID': 'Empty space',
            'VOUCH': 'Support',
            'VOWEL': 'Letter type',
            'VOWED': 'Made promise',
            'VOWELS': 'Letter types',
            'VOYAGE': 'Long journey'
        };

        let secretWord = '';
        let currentRow = 0;
        let gameOver = false;
        let guesses = [];
        let keyStatuses = {};
        let gamesWon = 0;
        let gamesLost = 0;
        let streak = 0;

        const ROWS = 6;
        const COLS = 5;

        // Load stats from localStorage
        function loadStats() {
            gamesWon = parseInt(localStorage.getItem('gamesWon') || '0');
            gamesLost = parseInt(localStorage.getItem('gamesLost') || '0');
            streak = parseInt(localStorage.getItem('streak') || '0');
            updateStatsDisplay();
        }

        // Save stats to localStorage
        function saveStats() {
            localStorage.setItem('gamesWon', gamesWon);
            localStorage.setItem('gamesLost', gamesLost);
            localStorage.setItem('streak', streak);
            updateStatsDisplay();
        }

        // Update stats display
        function updateStatsDisplay() {
            document.getElementById('gamesWon').textContent = gamesWon;
            document.getElementById('gamesLost').textContent = gamesLost;
            document.getElementById('streak').textContent = streak;
        }

        // Initialize the game
        function initializeGame() {
            secretWord = WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)];
            currentRow = 0;
            gameOver = false;
            guesses = [];
            keyStatuses = {};

            document.getElementById('message').textContent = '';
            document.getElementById('hint').textContent = `Hint: ${HINTS[secretWord] || 'Guess the word!'}`;
            document.getElementById('guessInput').value = '';
            document.getElementById('guessInput').disabled = false;
            document.getElementById('submitBtn').style.display = 'inline-block';
            document.getElementById('newGameBtn').style.display = 'none';
            document.getElementById('guessInput').focus();

            renderBoard();
            renderKeyboard();
        }

        // Render the game board
        function renderBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';

            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';

                    if (row < guesses.length) {
                        const letter = guesses[row][col];
                        tile.textContent = letter;
                        tile.classList.add('filled');

                        if (secretWord[col] === letter) {
                            tile.classList.add('correct');
                        } else if (secretWord.includes(letter)) {
                            tile.classList.add('present');
                        } else {
                            tile.classList.add('absent');
                        }
                    }

                    board.appendChild(tile);
                }
            }
        }

        // Render keyboard
        function renderKeyboard() {
            const keyboard = document.getElementById('keyboard');
            const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

            keyboard.innerHTML = '';
            alphabet.forEach(letter => {
                const key = document.createElement('button');
                key.textContent = letter;
                key.className = 'key';

                if (keyStatuses[letter]) {
                    key.classList.add(keyStatuses[letter]);
                }

                key.onclick = () => {
                    if (!gameOver) {
                        document.getElementById('guessInput').value += letter;
                        document.getElementById('guessInput').focus();
                    }
                };

                keyboard.appendChild(key);
            });
        }

        // Submit a guess
        function submitGuess() {
            const input = document.getElementById('guessInput').value.toUpperCase();
            const message = document.getElementById('message');

            if (input.length !== COLS) {
                message.textContent = 'Word must be 5 letters!';
                message.className = 'message error';
                return;
            }

            if (!WORD_LIST.includes(input)) {
                message.textContent = 'Not a valid word!';
                message.className = 'message error';
                return;
            }

            guesses.push(input);
            currentRow++;
            document.getElementById('guessInput').value = '';

            // Update key statuses
            for (let i = 0; i < COLS; i++) {
                const letter = input[i];
                if (secretWord[i] === letter) {
                    keyStatuses[letter] = 'correct';
                } else if (secretWord.includes(letter) && keyStatuses[letter] !== 'correct') {
                    keyStatuses[letter] = 'present';
                } else if (!keyStatuses[letter]) {
                    keyStatuses[letter] = 'absent';
                }
            }

            renderBoard();
            renderKeyboard();

            // Check win condition
            if (input === secretWord) {
                message.textContent = '🎉 You won! Amazing!';
                message.className = 'message success';
                gameOver = true;
                gamesWon++;
                streak++;
                saveStats();
                document.getElementById('guessInput').disabled = true;
                document.getElementById('submitBtn').style.display = 'none';
                document.getElementById('newGameBtn').style.display = 'inline-block';
                return;
            }

            // Check loss condition
            if (currentRow >= ROWS) {
                message.textContent = `Game Over! The word was: ${secretWord}`;
                message.className = 'message error';
                gameOver = true;
                gamesLost++;
                streak = 0;
                saveStats();
                document.getElementById('guessInput').disabled = true;
                document.getElementById('submitBtn').style.display = 'none';
                document.getElementById('newGameBtn').style.display = 'inline-block';
                return;
            }

            message.textContent = `Attempt ${currentRow}/${ROWS}`;
            message.className = 'message info';
        }

        // Handle Enter key
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('guessInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    submitGuess();
                }
            });

            loadStats();
            initializeGame();
        });
    </script>
</body>
</html>
